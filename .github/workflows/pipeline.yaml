name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:

  
  # 1. LINTER JOB
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Linter
        run: |
          echo "Running lint checks..."
          echo "Lint Passed!"

  # 2. TRAIN JOB
  train:
    runs-on: ubuntu-latest
    needs: linter

    if: >
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install numpy

      - name: Run training
        run: |
          echo "Training model..."
          python -c "print('Model trained successfully')"

      # error
      - name: Save error logs
        if: failure()
        run: |
          echo "Training failed!" > error_logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      # cleanup 
      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
